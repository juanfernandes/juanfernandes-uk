backend:
  name: github
  repo: juanfernandes/juanfernandes-uk
  branch: main
  base_url: https://decap-cms-oauth-iota.vercel.app
  auth_endpoint: auth

site_url: https://www.juanfernandes.uk

logo:
  src: https://www.juanfernandes.uk/assets/imgs/logo.svg
  show_in_header: true

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

media_library:
  name: uploadcare
  config:
    publicKey: demopublickey

publish_mode: simple

collections:
  - name: "watchlog_2026"
    label: "Watch Log — 2026"
    folder: "src/watchlog/2026"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{fields.title}}"
    identifier_field: "title"
    summary: "{{watchedOn}} — {{title}}"
    fields: &watchlog_fields
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Movie", value: "movie" }
          - { label: "TV", value: "tv" }

      - label: "Title"
        name: "title"
        widget: "string"
        required: false

      - label: "TMDb ID"
        name: "tmdbId"
        widget: "number"
        value_type: "int"

      - label: "Watched On"
        name: "watchedOn"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Season"
        name: "season"
        widget: "number"
        value_type: "int"
        required: false

      - label: "Episode"
        name: "episode"
        widget: "number"
        value_type: "int"
        required: false

      - label: "Rating"
        name: "rating"
        widget: "number"
        value_type: "float"
        min: 0
        max: 5
        step: 0.5
        required: false

      - label: "Rewatch"
        name: "rewatch"
        widget: "boolean"
        default: false

      - label: "Display as Movie"
        name: "displayAs"
        widget: "select"
        required: false
        options:
          - { label: "Movie", value: "movie" }

      - label: "Notes"
        name: "notes"
        widget: "text"
        required: false

  - name: "watchlog_2025"
    label: "Watch Log — 2025"
    folder: "src/watchlog/2025"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{fields.title}}"
    identifier_field: "title"
    summary: "{{watchedOn}} — {{title}}"
    fields: *watchlog_fields

  - name: "watchlog_2024"
    label: "Watch Log — 2024"
    folder: "src/watchlog/2024"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{fields.title}}"
    identifier_field: "title"
    summary: "{{watchedOn}} — {{title}}"
    fields: *watchlog_fields

  - name: "watchlog_2023"
    label: "Watch Log — 2023"
    folder: "src/watchlog/2023"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{fields.title}}"
    identifier_field: "title"
    summary: "{{watchedOn}} — {{title}}"
    fields: *watchlog_fields

  - name: "watchlog_2022"
    label: "Watch Log — 2022"
    folder: "src/watchlog/2022"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{fields.title}}"
    identifier_field: "title"
    summary: "{{watchedOn}} — {{title}}"
    fields: *watchlog_fields

  - name: "watchlog_2021"
    label: "Watch Log — 2021"
    folder: "src/watchlog/2021"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{fields.title}}"
    identifier_field: "title"
    summary: "{{watchedOn}} — {{title}}"
    fields: *watchlog_fields

  - name: "watchlog_2020"
    label: "Watch Log — 2020"
    folder: "src/watchlog/2020"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{fields.title}}"
    identifier_field: "title"
    summary: "{{watchedOn}} — {{title}}"
    fields: *watchlog_fields

  - name: "concerts"
    label: "Concerts"
    files:
      - name: "concerts"
        label: "Concerts"
        file: "src/_data/concertsData.json"
        format: "json"
        fields:
          - label: "Entries"
            name: "entries"
            widget: "list"
            summary: "{{fields.date}} — {{fields.artists}} — {{fields.venue}}"
            fields:
              - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
              - label: "Artists"
                name: "artists"
                widget: "list"
                field: { label: "Artist", name: "value", widget: "string" }
              - { label: "Venue", name: "venue", widget: "string", required: false }
              - { label: "City", name: "city", widget: "string", required: false }
              - { label: "Country", name: "country", widget: "string", required: false }
              - { label: "Notes", name: "notes", widget: "string", required: false }
              - label: "Links"
                name: "links"
                widget: "object"
                required: false
                fields:
                  - { label: "Setlist.fm", name: "setlistFm", widget: "string", required: false }
                  - { label: "Tickets", name: "tickets", widget: "string", required: false }

  - name: "lego"
    label: "LEGO"
    files:
      - name: "lego"
        label: "LEGO Collection"
        file: "src/_data/legoData.json"
        format: "json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.status}} — {{fields.setNumber}} — {{fields.name}}"
            fields:
              - { label: "Status", name: "status", widget: "select", options: ["owned", "wanted"], default: "owned" }
              - { label: "Set number", name: "setNumber", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Theme", name: "theme", widget: "string" }
              - { label: "Subtheme", name: "subtheme", widget: "string", required: false }
              - { label: "Year", name: "year", widget: "number", value_type: "int", required: false }
              - { label: "Pieces", name: "pieces", widget: "number", value_type: "int", required: false }
              - { label: "Built", name: "built", widget: "boolean", required: false, default: false }
              - { label: "Acquired on", name: "acquiredOn", widget: "datetime", format: "YYYY-MM-DD", time_format: false, required: false }
              - { label: "Image URL", name: "image", widget: "string", required: false }
              - { label: "Link URL", name: "url", widget: "string", required: false }
              - { label: "Notes", name: "notes", widget: "text", required: false }

  - name: "games"
    label: "Games"
    files:
      - name: "games"
        label: "Games Collection"
        file: "src/_data/gamesData.json"
        format: "json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.status}} — {{fields.platform}} — {{fields.title}}"
            fields:
              - { label: "Status", name: "status", widget: "select", options: ["owned", "wanted"], default: "owned" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Platform", name: "platform", widget: "string", default: "PC", required: true }
              - { label: "Play status", name: "playStatus", widget: "select", options: ["unplayed", "playing", "completed", "abandoned", "wishlist"], default: "unplayed", required: false }
              - { label: "Release year", name: "releaseYear", widget: "number", value_type: "int", required: false }
              - { label: "Acquired on", name: "acquiredOn", widget: "datetime", format: "YYYY-MM-DD", time_format: false, required: false }
              - { label: "Cover URL", name: "cover", widget: "string", required: false }
              - { label: "Link URL", name: "url", widget: "string", required: false }
              - { label: "Notes", name: "notes", widget: "text", required: false }

  - name: "music"
    label: "Music"
    files:
      - name: "music"
        label: "Music Collection"
        file: "src/_data/musicData.json"
        format: "json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.media}} — {{fields.folder}} — {{fields.artist}} — {{fields.title}}"
            fields:
              - { label: "Added on", name: "addedOn", widget: "datetime", format: "YYYY-MM-DD", time_format: false, required: false }
              - { label: "Media", name: "media", widget: "select", options: ["vinyl", "cd"], default: "vinyl" }
              - { label: "Folder", name: "folder", widget: "string", required: true }
              - { label: "Artist", name: "artist", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Label", name: "label", widget: "string", required: false }
              - { label: "Format", name: "format", widget: "string", required: false }
              - { label: "Year", name: "year", widget: "number", value_type: "int", required: false }
              - { label: "Discogs URL", name: "url", widget: "string", required: false }
              - { label: "Cover URL", name: "cover", widget: "string", required: false }
              - { label: "Notes", name: "notes", widget: "text", required: false }
